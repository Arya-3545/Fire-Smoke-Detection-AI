<!DOCTYPE html>
<html>
<head>
<title>AI Fire & Smoke Detection</title>

<!-- PREMIUM FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color:white;
    text-align:center;
}

/* HEADER */
h1 {
    font-family:'Playfair Display', serif;
    font-size:42px;
    font-weight:600;
    margin-top:20px;
    color:#f8fafc;
}

/* GLASS CARD */
.container {
    width: 80%;
    margin: auto;
    margin-top: 30px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

/* BUTTONS */
.btn {
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    padding:12px 20px;
    margin:10px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover {
    background: rgba(56,189,248,0.2);
    border-color:#38bdf8;
}

/* INPUT */
input {
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
    width:220px;
    background: rgba(255,255,255,0.1);
    color:white;
}

/* VIDEO */
.video-container {
    position:relative;
    display:inline-block;
}

video {
    margin-top:20px;
    border-radius:15px;
    box-shadow: 0 0 30px rgba(56,189,248,0.2);
}

/* BOUNDING BOX */
#bbox {
    position:absolute;
    border:3px solid red;
    width:200px;
    height:200px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    display:none;
    border-radius:10px;
}

/* STATUS */
#status {
    font-size:24px;
    margin-top:15px;
}

/* STATES */
.fire { color:#ef4444; }
.smoke { color:#f59e0b; }
.safe { color:#22c55e; }

/* DEVICE PANEL */
#devicePanel {
    display:none;
}
</style>
</head>

<body>

<h1>AI Fire & Smoke Detection</h1>

<div class="container">

<button class="btn" onclick="useWebcam()">Use Webcam</button>
<button class="btn" onclick="showDevice()">Connect Device</button>

<div id="devicePanel">
    <input id="url" placeholder="Camera Link">
    <input id="location" placeholder="Location">
    <button class="btn" onclick="connectDevice()">Connect</button>
</div>

<div class="video-container">
    <video id="video" width="600" autoplay></video>
    <div id="bbox"></div>
</div>

<p id="status">System Ready</p>
<h3 id="assistant"></h3>

</div>

<script>
const video = document.getElementById("video");
const statusText = document.getElementById("status");
const assistant = document.getElementById("assistant");
const bbox = document.getElementById("bbox");

// 🔊 SOFT ALERT SOUND (NOT HARSH)
const beep = new Audio("https://www.soundjay.com/button/beep-07.wav");

// 🎤 VOICE CONTROL
let lastSpeak = 0;
function speak(text){
    let now = Date.now();
    if(now - lastSpeak > 5000){
        speechSynthesis.speak(new SpeechSynthesisUtterance(text));
        lastSpeak = now;
    }
}

let mode = "";
let cam_id = "cam1";

// UI
function showDevice(){
    document.getElementById("devicePanel").style.display = "block";
}

function useWebcam(){
    mode="webcam";
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream => video.srcObject = stream);
}

function connectDevice(){
    let url = document.getElementById("url").value;
    let location = document.getElementById("location").value;

    if(!url) return alert("Enter camera link");

    mode="cctv";

    fetch('/add_camera',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:cam_id,url:url})
    });

    assistant.innerText = "Connected to " + location;
}

// DETECTION LOOP
setInterval(()=>{

    if(!mode) return;

    let imageData="";

    if(mode==="webcam"){
        if(!video.videoWidth) return;

        let canvas=document.createElement("canvas");
        canvas.width=video.videoWidth;
        canvas.height=video.videoHeight;

        canvas.getContext("2d").drawImage(video,0,0);
        imageData = canvas.toDataURL("image/jpeg");
    }

    fetch('/predict',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({image:imageData,mode:mode,cam_id:cam_id})
    })
    .then(res=>res.json())
    .then(data=>{

        if(data.confidence < 0.4){
            statusText.innerText="Analyzing...";
            bbox.style.display="none";
            return;
        }

        statusText.innerText = data.label + " (" + data.confidence + ")";
        statusText.className="";

        if(data.label==="fire"){
            statusText.classList.add("fire");
            bbox.style.display="block";

            beep.play();
            speak("Fire detected. Take emergency action.");

            assistant.innerText="Fire Detected";
        }
        else if(data.label==="smoke"){
            statusText.classList.add("smoke");
            bbox.style.display="block";

            beep.play();
            speak("Smoke detected.");

            assistant.innerText="Smoke Detected";
        }
        else{
            statusText.classList.add("safe");
            bbox.style.display="none";

            assistant.innerText="Area is safe";
        }

    });

},700);
</script>

</body>
</html>
